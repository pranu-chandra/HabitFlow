<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HabitFlow{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #080c14;
            --bg2: #0d1220;
            --bg3: #111827;
            --surface: rgba(255,255,255,0.04);
            --surface2: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --text: #f0f4ff;
            --text2: #8b95b0;
            --text3: #4a5268;
            --accent: #5EEAD4;
            --accent2: #818CF8;
            --accent3: #F472B6;
            --gold: #FBD260;
            --danger: #F87171;
            --success: #34D399;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glow: 0 0 40px rgba(94, 234, 212, 0.12);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(94,234,212,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(129,140,248,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 2rem;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(8,12,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem; font-weight: 800;
            color: var(--text);
            text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 0.25rem; }
        .nav-links a {
            color: var(--text2); text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.88rem; font-weight: 500;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-links a.active { color: var(--accent); background: rgba(94,234,212,0.1); }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .nav-user {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.88rem; color: var(--text2);
        }
        .nav-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: #fff;
            font-family: 'Syne', sans-serif;
        }
        .btn-nav-logout {
            color: var(--text3); text-decoration: none;
            font-size: 0.82rem; padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px; transition: all 0.2s;
        }
        .btn-nav-logout:hover { color: var(--danger); border-color: var(--danger); }

        /* LAYOUT */
        .page { padding-top: 64px; min-height: 100vh; position: relative; z-index: 1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .container-sm { max-width: 480px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* CARDS */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border2); }
        .card-glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        /* BUTTONS */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 0.6rem 1.25rem;
            border-radius: 10px; border: none; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 500;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent); color: #050d10;
            font-weight: 600;
        }
        .btn-primary:hover { background: #7ef5e3; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(94,234,212,0.3); }
        .btn-secondary {
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
        .btn-danger:hover { background: rgba(248,113,113,0.25); }
        .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.82rem; border-radius: 8px; }
        .btn-icon { padding: 0.5rem; border-radius: 8px; aspect-ratio: 1; }

        /* FORM */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.82rem; color: var(--text2); margin-bottom: 0.4rem; font-weight: 500; letter-spacing: 0.02em; }
        input, select, textarea {
            width: 100%; padding: 0.7rem 1rem;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(94,234,212,0.12);
        }
        select option { background: var(--bg3); }
        textarea { resize: vertical; min-height: 80px; }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            display: flex; flex-direction: column; gap: 4px;
            position: relative; overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }
        .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-card.teal::before { background: linear-gradient(90deg, var(--accent), transparent); }
        .stat-card.purple::before { background: linear-gradient(90deg, var(--accent2), transparent); }
        .stat-card.pink::before { background: linear-gradient(90deg, var(--accent3), transparent); }
        .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), transparent); }
        .stat-label { font-size: 0.78rem; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; }
        .stat-sub { font-size: 0.78rem; color: var(--text2); }

        /* PROGRESS */
        .progress-bar { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

        /* BADGE */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 0.2rem 0.6rem;
            border-radius: 99px; font-size: 0.72rem; font-weight: 600;
        }
        .badge-teal { background: rgba(94,234,212,0.15); color: var(--accent); }
        .badge-purple { background: rgba(129,140,248,0.15); color: var(--accent2); }
        .badge-pink { background: rgba(244,114,182,0.15); color: var(--accent3); }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg2); border: 1px solid var(--border2);
            border-radius: 20px; padding: 2rem; width: 100%; max-width: 480px;
            transform: translateY(20px) scale(0.97); transition: transform 0.3s;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: none; }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; }
        .modal-close {
            background: none; border: none; color: var(--text3); cursor: pointer;
            font-size: 1.3rem; line-height: 1; transition: color 0.2s; padding: 4px;
        }
        .modal-close:hover { color: var(--text); }

        /* TOAST */
        .toast-container { position: fixed; top: 80px; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            background: var(--bg3); border: 1px solid var(--border2);
            border-radius: 10px; padding: 0.75rem 1.25rem;
            font-size: 0.88rem; color: var(--text);
            display: flex; align-items: center; gap: 8px;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            min-width: 200px; max-width: 320px;
        }
        .toast.success { border-color: rgba(52,211,153,0.3); }
        .toast.success::before { content: '✓'; color: var(--success); font-weight: 700; }
        @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
        @keyframes fadeOut { from { opacity:1; } to { opacity:0; transform: translateX(20px); } }

        /* SECTION HEADER */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem; font-weight: 700; color: var(--text);
        }
        .section-sub { font-size: 0.82rem; color: var(--text3); }

        /* DIVIDER */
        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        /* SCROLL */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(12px); }
            to { opacity:1; transform: none; }
        }
        .fade-up { animation: fadeUp 0.4s ease both; }
        .fade-up-d1 { animation-delay: 0.05s; }
        .fade-up-d2 { animation-delay: 0.1s; }
        .fade-up-d3 { animation-delay: 0.15s; }
        .fade-up-d4 { animation-delay: 0.2s; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .container { padding: 1.25rem 1rem; }
            .nav-links { display: none; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ICON PICKER */
        .icon-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 0.5rem;
        }
        .icon-option {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; background: var(--bg3); transition: all 0.15s;
        }
        .icon-option:hover { background: var(--surface2); }
        .icon-option.selected { border-color: var(--accent); background: rgba(94,234,212,0.1); }

        /* COLOR PICKER */
        .color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.5rem; }
        .color-swatch {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s;
        }
        .color-swatch:hover { transform: scale(1.15); }
        .color-swatch.selected { border-color: white; transform: scale(1.15); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% if session.get('user_id') %}
<nav>
    <a class="nav-logo" href="/dashboard">Habit<span>Flow</span></a>
    <div class="nav-links">
        <a href="/dashboard" {% if request.path == '/dashboard' %}class="active"{% endif %}>
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
        </a>
        <a href="/analytics" {% if request.path == '/analytics' %}class="active"{% endif %}>
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Analytics
        </a>
    </div>
    <div class="nav-right">
        <div class="nav-user">
            <div class="nav-avatar">{{ session.username[:2].upper() }}</div>
            <span style="color:var(--text2)">{{ session.username }}</span>
        </div>
        <a class="btn-nav-logout" href="/export" title="Export CSV">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        </a>
        <a class="btn-nav-logout" href="/logout">Sign out</a>
    </div>
</nav>
{% endif %}

<div class="toast-container" id="toastContainer"></div>

<div class="page">
    {% block content %}{% endblock %}
</div>

<script>
function showToast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3200);
}
function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
}
document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if(e.target === m) closeModal(m.id); });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
