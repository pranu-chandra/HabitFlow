<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — HabitFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14; --bg2: #0d1220; --bg3: #111827;
            --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
            --text: #f0f4ff; --text2: #8b95b0; --text3: #4a5268;
            --accent: #5EEAD4; --accent2: #818CF8;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: grid; place-items: center;
            padding: 1rem;
        }
        body::before {
            content: '';
            position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 600px;
            background: radial-gradient(ellipse, rgba(94,234,212,0.07) 0%, transparent 65%);
            pointer-events: none;
        }
        .auth-wrap {
            width: 100%; max-width: 420px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; } }
        .logo {
            font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
            text-align: center; margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }
        .logo span { color: var(--accent); }
        .logo-tagline { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text3); font-weight: 300; margin-top: 4px; }
        .card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 2rem;
        }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
        .card-sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 1.75rem; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.4rem; font-weight: 500; }
        input {
            width: 100%; padding: 0.72rem 1rem;
            background: var(--bg3); border: 1px solid var(--border2);
            border-radius: 10px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,234,212,0.12); }
        input::placeholder { color: var(--text3); }
        .btn {
            width: 100%; padding: 0.78rem;
            background: var(--accent); color: #050d10;
            border: none; border-radius: 10px; cursor: pointer;
            font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
            transition: all 0.2s; margin-top: 0.5rem; letter-spacing: 0.01em;
        }
        .btn:hover { background: #7ef5e3; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(94,234,212,0.3); }
        .error-msg {
            background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
            color: #FCA5A5; border-radius: 8px; padding: 0.65rem 0.9rem;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .success-msg {
            background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25);
            color: #6EE7B7; border-radius: 8px; padding: 0.65rem 0.9rem;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .auth-link {
            text-align: center; margin-top: 1.25rem;
            font-size: 0.85rem; color: var(--text2);
        }
        .auth-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="logo">
        Habit<span>Flow</span>
        <div class="logo-tagline">Build better habits, one day at a time</div>
    </div>
    <div class="card">
        <div class="card-title">Welcome!</div>
        <div class="card-sub">Sign in to continue your streak 🔥</div>
        {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
        {% if registered %}<div class="success-msg">Account created! Sign in below.</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="auth-link">
            Don't have an account? <a href="/register">Create one free</a>
        </div>
    </div>
</div>
</body>
</html>
